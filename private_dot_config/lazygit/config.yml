customCommands:
  - key: "<c-s>"
    context: "global"
    command: "codex e --profile fast 'Use $commit but only for staged changes'"
    loadingText: "Generating commit message, rebase and push"
  - key: "<c-p>"
    context: "global"
    command: "claude -p '/pr-create'"
    loadingText: "Creating pull request"
  - key: "<c-q>"
    context: "global"
    command: 'rm -f "$(git rev-parse --git-dir)/index.lock"'
    loadingText: "Removing git index lock"
  - key: "<c-u>"
    context: "global"
    command: "git submodule update --force"
    loadingText: "Updating git submodules with force"

git:
  autoFetch: false
  autoRefresh: true

gui:
  spinner:
    frames:
      - "⢿"
      - "⣻"
      - "⣽"
      - "⣾"
      - "⣷"
      - "⣯"
      - "⣟"
      - "⡿"
  theme:
    activeBorderColor:
      - '#8bd5ca'
      - bold
    inactiveBorderColor:
      - '#a5adcb'
    searchingActiveBorderColor:
      - '#eed49f'
    optionsTextColor:
      - '#8aadf4'
    selectedLineBgColor:
      - '#363a4f'
    inactiveViewSelectedLineBgColor:
      - '#6e738d'
    cherryPickedCommitFgColor:
      - '#8bd5ca'
    cherryPickedCommitBgColor:
      - '#494d64'
    markedBaseCommitFgColor:
      - '#8aadf4'
    markedBaseCommitBgColor:
      - '#eed49f'
    unstagedChangesColor:
      - '#ed8796'
    defaultFgColor:
      - '#cad3f5'

  authorColors:
    '*': '#b7bdf8'
