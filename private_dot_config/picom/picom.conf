#################################
# Picom Configuration (Picom 13)
#################################

#################################
# Backend
#################################

backend = "glx";
vsync = true;

#################################
# Shadows
#################################

shadow = true;
shadow-radius = 12;
shadow-offset-x = -10;
shadow-offset-y = 10;
shadow-opacity = 0.35;

shadow-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'Rofi'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "window_type = 'notification'"
];

#################################
# Rounded Corners
#################################

corner-radius = 8;

rounded-corners-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'Rofi'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "window_type = 'notification'"
];

#################################
# Fading
#################################

fading = true;
fade-delta = 5;
fade-in-step = 0.06;
fade-out-step = 0.06;

#################################
# Transparency
#################################

active-opacity = 1.0;
inactive-opacity = 0.95;
frame-opacity = 0.95;

detect-client-opacity = true;

#################################
# Focus Detection
#################################

mark-wmwin-focused = true;
mark-ovredir-focused = true;

#################################
# Blur (Optional)
#################################

# Uncomment if you want blurred transparent windows.
#
# blur:
# {
#     method = "dual_kawase";
#     strength = 5;
# }

#################################
# Performance
#################################

use-damage = true;

#################################
# Logging
#################################

log-level = "warn";
