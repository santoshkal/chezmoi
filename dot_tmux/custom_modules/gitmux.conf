# vim:set ft=tmux:
%hidden MODULE_NAME="gitmux"

# Requires https://github.com/arl/gitmux
set -ogq "@catppuccin_${MODULE_NAME}_icon" "󰊢 "
set -ogqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_teal}"
set -gq "@catppuccin_${MODULE_NAME}_text" ' #(gitmux -cfg $HOME/.tmux/custom_modules/gitmux.conf "#{pane_current_path}")'

source -F $HOME/.gitmux.conf
