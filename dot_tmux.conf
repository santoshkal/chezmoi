# set -g default-terminal "xterm-kitty"
set -g default-terminal "ghostty"
set -g default-terminal "tmux-256color"

set -g prefix C-s
unbind C-b
bind-key C-s send-prefix


# Split Tmux window vertically
# Ca |
unbind %
bind | split-window -h

# Kill a nonresponsive window
bind q killp
bind Q kill-server
# Split Tmux pane horizontally
# C-a -
unbind '"'
bind -  split-window -v

# source siles C-a
unbind r
bind r source-file ~/.tmux.conf \; display 'Sourced $HOME/tmux.conf!'

# Resize split windows with HJKL keys 
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r n break-pane
# Kill a Pane
bind -r z kill-pane -a
# Switch between sessions
 bind [ switch-client -n
 bind ] switch-client -p
# Maximize window pane
bind -r m resize-pane -Z

#TMUX-FZF KeyBind
TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_ORDER="session|window|pane|command|keybinding|clipboard|process"
TMUX_FZF_PANE_FORMAT="[#{window_name}] #{pane_current_command}  [#{pane_width}x#{pane_height}] [history #{history_size}/#{history_limit}, #{history_bytes} bytes] #{?pane_active,[active],[inactive]}"

set -g status on
set -g mouse on
set -g @yank_with_mouse 'on'
set -g @continuum-boot 'on'

# set the status bar to top
set-option -g status-position top
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
set -g detach-on-destroy off  # don't exit from tmux when closing a session
# Set base window number from 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1
unbind -T copy-mode-vi MouseDragEnd1Pane

# Tmux plunin manager
set -g @plugin 'tmux-plugins/tpm'
# Plugins
set -g @plugin 'jaclu/tmux-menus'
# set -g @plugin 'Chaitanyabsprip/tmux-harpoon'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'sainnhe/tmux-fzf'


set -g @plugin 'Morantron/tmux-fingers'

